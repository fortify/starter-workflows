name: OpenText Fortify AST Scan

# Customize trigger events based on your DevSecOps process and/or policy
on:
  push:
    branches: [ $default-branch, $protected-branches ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ $default-branch ]
  schedule:
    - cron: $cron-weekly
  workflow_dispatch:

jobs:
  Fortify-AST-Scan:
    # Use the appropriate runner for building your source code. Ensure dev tools required to build your code are present and configured appropriately (MSBuild, Python, etc).
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      # pull-requests: write     # Required if DO_PR_COMMENT is set to true

    steps:
      # Check out source code
      - name: Check Out Source Code
        uses: actions/checkout@v4
        
      # Set up build tools as required for building/packaging your source code
      # - name: Set up build tools
      #   uses: actions/setup-*

      # Perform SAST and/or SCA scan via OpenText Application Security (Fortify on Demand, Fortify Hosted,
      # Software Security Center, ScanCentral SAST, Debricked). Based on configuration, the Fortify GitHub 
      # Action can optionally set up the application version/release, generate job summaries and Pull Request 
      # comments, and/or export scan results back into GitHub through the GitHub code scanning dashboard or
      # through source code annotations.
      #
      # The Fortify GitHub Action provides many customization capabilities, but in case further customization is
      # required, you can the fortify/github-action/setup@v3 sub-action to set up the various Fortify tools
      # and run them directly from within your pipeline. It is recommended to review the Fortify GitHub Action
      # documentation at https://fortify.github.io/fcli/v3/ci/github/v3.0.x/index.html for more information on 
      # the various configuration options and available sub-actions.
      #
      # Given the many configuration and customization options, it is recommended to set up one or more reusable
      # workflows or composite actions in your organization to provide consistent configuration and optional
      # version pinning across all repositories.
      - name: Run Fortify Scan
        # Specify Fortify GitHub Action version to run. As per GitHub starter workflow requirements, this example
        # uses the commit id corresponding to version 3.0.0. It is recommended to check whether any later releases
        # are available at https://github.com/fortify/github-action/releases. Depending on the amount of stability
        # required, you may either use pinned versions for both GitHub Action and fcli, or semantic versions like
        # `v3` to automatically benefit from new features and bug fixes.
        uses: fortify/github-action@fe696f25f4db23894eedc449c7443cbcfbe8a3c4
        env:
          #############################################################
          ##### Fortify on Demand configuration
          ##### Remove this section if you're integrating with Fortify Hosted/Software Security Center (see below)
          FOD_URL: https://ams.fortify.com                     # Must be hardcoded or configured through GitHub variable, not secret
          FOD_TENANT: ${{secrets.FOD_TENANT}}                  # Either tenant/user/password or client id/secret are required;
          FOD_USER: ${{secrets.FOD_USER}}                      # these should be configured through GitHub secrets.
          FOD_PASSWORD: ${{secrets.FOD_PAT}}
          # FOD_CLIENT_ID: ${{secrets.FOD_CLIENT_ID}}
          # FOD_CLIENT_SECRET: ${{secrets.FOD_CLIENT_SECRET}}
          # FOD_RELEASE: MyApp:MyRelease                       # FoD release name, default: <org>/<repo>:<branch>
          # ...                                                # Any other workflow configuration settings; see docs
          # FCLI_BOOTSTRAP_VERSION: v3.15.0                    # Pin fcli to specific version; by default, latest `v3` is used
          # FCLI_BOOTSTRAP_URL: <URL>                          # Override fcli download URL, for example to use internal mirror
          # TOOL_DEFINITIONS: <URL>                            # Override Fortify tool definitions URL, for example to use internal mirror

          #############################################################
          ##### Fortify Hosted / Software Security Center & ScanCentral
          ##### Remove this section if you're integrating with Fortify on Demand (see above)
          ### Required configuration
          SSC_URL: ${{vars.SSC_URL}}                           # Must be hardcoded or configured through GitHub variable, not secret
          SSC_TOKEN: ${{secrets.SSC_TOKEN}}                    # SSC CIToken; credentials should be configured through GitHub secrets
          # SSC_USER: ${{secrets.SSC_USER}}                    # Alternatively, configure SSC username and password
          # SSC_PASSWORD: ${{secrets.SSC_PASSWORD}}      
          SC_SAST_TOKEN: ${{secrets.SC_CLIENT_AUTH_TOKEN}}     # ScanCentral SAST client_auth_token, required if SAST scan is enabled
          DEBRICKED_ACCESS_TOKEN: ${{secrets.DEBRICKED_TOKEN}} # Debricked access token, required if Debricked scan is enabled
          # ...                                                # Any other workflow configuration settings; see docs
          # FCLI_BOOTSTRAP_VERSION: v3.15.0                    # Pin fcli to specific version; by default, latest `v3` is used
          # FCLI_BOOTSTRAP_URL: <URL>                          # Override fcli download URL, for example to use internal mirror
          # TOOL_DEFINITIONS: <URL>                            # Override Fortify tool definitions URL, for example to use internal mirror
